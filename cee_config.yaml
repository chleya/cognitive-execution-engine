llm:
  provider: static
  model: gpt-4
  api_key_env: CEE_LLM_API_KEY
  embedding_model: text-embedding-3-small
  embedding_api_key_env: CEE_EMBEDDING_API_KEY

tools:
  allowed_domains:
    - "*"
  rate_limit: 60
  timeout_seconds: 30.0
  max_output_size: 100000
  sandbox_enabled: true

policy:
  auto_approve_read: true
  require_approval_write: true
  max_patch_size: 100
  allowed_sections:
    - memory
    - goals
    - beliefs
    - self_model
    - policy
    - domain_data
    - tool_affordances
    - meta

persistence:
  storage_dir: cee_storage
  state_file: cee_state.json
  events_file: cee_events.jsonl
  snapshot_interval: 100
  auto_save: true

observability:
  verbose_logging: false
  breakpoints: []
  export_metrics: true
  metrics_interval_seconds: 10.0

api:
  host: 0.0.0.0
  port: 8000
  debug: false
  cors_origins:
    - "*"

metadata: {}
